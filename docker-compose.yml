# ═══════════════════════════════════════════════════════════════════════════════
# SEOOptimizer — Docker Compose
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
# ═══════════════════════════════════════════════════════════════════════════════

services:
  seooptimizer:
    build: .
    container_name: seooptimizer
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - chroma_data:/app/chroma_db
      - app_data:/app/data
    restart: unless-stopped

volumes:
  chroma_data:
  app_data:
